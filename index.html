<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adopt Me Trading Values</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fce4ec;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #ff8a80;
      padding: 20px;
      color: white;
    }
    h1 {
      margin: 0;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 800px;
    }
    th, td {
      border: 1px solid #ff8a80;
      padding: 8px;
    }
    th {
      background-color: #ff5252;
      color: white;
    }
    input, button {
      padding: 8px;
      margin: 5px;
      font-size: 16px;
    }
    form {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Adopt Me Trading Values</h1>
  <p>See the latest pet values and add your own trades!</p>
</header>

<h2>Trading Chart</h2>
<table id="tradeTable">
  <thead>
    <tr>
      <th>Pet Name</th>
      <th>Rarity</th>
      <th>Value</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>Cat</td><td>Common</td><td>5</td></tr>
    <tr><td>Unicorn</td><td>Legendary</td><td>20</td></tr>
  </tbody>
</table>

<h2>Add a Trade</h2>
<form id="tradeForm">
  <input type="text" id="petName" placeholder="Pet Name" required>
  <input type="text" id="rarity" placeholder="Rarity" required>
  <input type="number" id="value" placeholder="Value" required>
  <button type="submit">Add Trade</button>
</form>

<script>
  const form = document.getElementById('tradeForm');
  const table = document.getElementById('tradeTable').getElementsByTagName('tbody')[0];

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('petName').value;
    const rarity = document.getElementById('rarity').value;
    const value = document.getElementById('value').value;

    const newRow = table.insertRow();
    newRow.insertCell(0).textContent = name;
    newRow.insertCell(1).textContent = rarity;
    newRow.insertCell(2).textContent = value;

    form.reset();
  });
</script>

</body>
</html>
